<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo justify-content</title>


    <style>

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #eef1f6;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 16px;
        }

        header {
            background-color: #071526;
            color: white;
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 2vw;
        }

        .logo {
            font-family: 'Georgia', serif;
            font-size: 1.4rem;
            letter-spacing: 0.04em;
        }

        .hero {
            width: 100%;
            min-height: 30vh;
            background-color: #071526;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2vw;
        }

        .hero h1 {
            font-family: 'Georgia', serif;
            font-size: clamp(1.8rem, 5vw, 3.8rem);
            margin-bottom: 0.4em;
        }

        .hero p {
            font-size: clamp(0.9rem, 2vw, 1.15rem);
            opacity: 0.82;
        }

        main {
            width: 92vw;
            max-width: 1400px;
            margin: 3vh auto;
        }

        /* Etiqueta de cada demo */
        .etiqueta {
            font-size: 0.85rem;
            color: #555;
            margin-bottom: 0.4rem;
            margin-top: 1.5rem;
        }

        /* Contenedor flex común a las tres demos */
        .demo {
            display: flex;
            gap: 0.8rem;
            background-color: #d0d8e4;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 0.5rem;
        }

        /* Cada caja dentro del contenedor */
        .caja {
            width: clamp(60px, 8vw, 120px);
            height: clamp(60px, 8vw, 120px);
            background-color: #006dff;
            border-radius: 4px;
        }

        /* Las tres variantes */
        .demo.flex-start     { justify-content: flex-start; }
        .demo.flex-end       { justify-content: flex-end; }
        .demo.center         { justify-content: center; }
        .demo.space-between  { justify-content: space-between; }
        .demo.space-around   { justify-content: space-around; }

        

    </style>
</head>

<body>

    <header>
        <span class="logo">BlueBoard Studio</span>
    </header>

    <section class="hero">
        <h1>Demo justify-content</h1>
        <p>justify-content · flex-wrap · TPED1 · EASDA</p>
        <P>Carlos Marhuenda Bermúdez</P>
    </section>

    <main>
        <p class="etiqueta">flex-start</p>
        <div class="demo flex-start">
            <div class="caja"></div>
            <div class="caja"></div>
            <div class="caja"></div>
            <div class="caja"></div>
        </div>

        <p class="etiqueta">flex-end</p>
        <div class="demo flex-end">
            <div class="caja"></div>
            <div class="caja"></div>
            <div class="caja"></div>
            <div class="caja"></div>
        </div>

        <p class="etiqueta">center</p>
        <div class="demo center">
            <div class="caja"></div>
            <div class="caja"></div>
            <div class="caja"></div>
            <div class="caja"></div>
        </div>

        <p class="etiqueta">space-between</p>
        <div class="demo space-between">
            <div class="caja"></div>
            <div class="caja"></div>
            <div class="caja"></div>
            <div class="caja"></div>
        </div>

        <p class="etiqueta">space-around</p>
        <div class="demo space-around">
            <div class="caja"></div>
            <div class="caja"></div>
            <div class="caja"></div>
            <div class="caja"></div>
        </div>
    </main>

</body>

</html>
